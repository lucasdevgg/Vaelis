<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yokko</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: radial-gradient(circle at top, #1a0f1f, #0a0a0f, #140a1a);
  color: #ffe4f3;
  overflow-x: hidden;
}

/* Glow mouse */
body::before {
  content: "";
  position: fixed;
  top: var(--y);
  left: var(--x);
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(255,182,193,0.2), transparent 70%);
  pointer-events: none;
  transform: translate(-50%, -50%);
}

/* Background */
#canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* Logo */
nav {
  position: fixed;
  top: 20px;
  left: 20px;
}

nav img {
  width: 60px;
  filter: drop-shadow(0 0 15px #ff8bdc);
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  animation: float 4s ease-in-out infinite;
}

/* FOTO */
.avatar {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  margin-bottom: 20px;
  object-fit: cover;
  border: 2px solid #ff8bdc;
  box-shadow: 
    0 0 20px #ff8bdc,
    0 0 40px #c084fc,
    0 0 60px #f9a8d4;
  transition: 0.4s;
}

.avatar:hover {
  transform: scale(1.08);
  box-shadow: 
    0 0 30px #ff8bdc,
    0 0 60px #c084fc,
    0 0 90px #f9a8d4;
}

/* NOME */
h1 {
  font-size: 52px;
  cursor: pointer;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from {
    text-shadow: 0 0 10px #ff8bdc;
  }
  to {
    text-shadow: 0 0 25px #ff8bdc, 0 0 40px #c084fc;
  }
}

/* SUB */
p {
  margin-top: 8px;
  color: #f3cfff;
  font-size: 13px;
}

/* BOTÃO */
.btn {
  margin-top: 25px;
  padding: 10px 25px;
  border: 1px solid #ff8bdc;
  color: #ff8bdc;
  border-radius: 30px;
  font-size: 13px;
  transition: 0.3s;
  backdrop-filter: blur(5px);
  text-decoration: none;
}

.btn:hover {
  background: linear-gradient(45deg, #ff8bdc, #c084fc);
  color: white;
  box-shadow: 0 0 20px #ff8bdc;
}

/* SECTION */
section {
  padding: 100px 20px;
  max-width: 800px;
  margin: auto;
  text-align: center;
}

h2 {
  color: #ff8bdc;
  margin-bottom: 20px;
}

section p {
  color: #e5ccff;
}

/* SKILLS */
.skills span {
  display: inline-block;
  margin: 6px;
  padding: 6px 12px;
  border: 1px solid #ff8bdc;
  border-radius: 20px;
  font-size: 12px;
  transition: 0.3s;
}

.skills span:hover {
  background: #ff8bdc;
  color: white;
  transform: scale(1.1);
}

/* FOOTER */
footer {
  text-align: center;
  padding: 30px;
  font-size: 12px;
  color: #777;
  border-top: 1px solid #1f1f2a;
}

/* FLOAT */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}
</style>

</head>

<body>

<canvas id="canvas"></canvas>

<nav>
  <img src="https://i.postimg.cc/CK9Hnbn3/file-0000000088b871f5b587bd77d7845430.png">
</nav>

<div class="hero">

<img class="avatar" src="https://i.postimg.cc/cJR0yKk9/channels4-profile.jpg">

<h1 id="yokko">Yokko</h1>
<p>soft dev ✦ dreamy ✦ aesthetic ✦ cat lover 🐾</p>

<a href="#about" class="btn">Explore ✨</a>

</div>

<section id="about">
<h2>About</h2>
<p>
I build aesthetic websites, bots and systems.  
I love creating soft, dreamy experiences and mixing tech with art 💖
</p>
</section>

<section>
<h2>Skills</h2>
<div class="skills">
<span>Python</span>
<span>HTML</span>
<span>CSS</span>
<span>JavaScript</span>
<span>Ruby</span>
<span>Assembly</span>
</div>
</section>

<footer>
© 2026 Yokko ✦
</footer>

<script>
// mouse glow
document.addEventListener("mousemove", e => {
  document.body.style.setProperty('--x', e.clientX + 'px');
  document.body.style.setProperty('--y', e.clientY + 'px');
});

// nome toggle
const name = document.getElementById("yokko");
let isToggled = false;

name.addEventListener("click", () => {
  isToggled = !isToggled;
  name.innerText = isToggled ? "Yokko.xyz" : "Yokko";
});
</script>

<script>
// particles
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let particles = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

for (let i = 0; i < 70; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2 + 1,
    speed: Math.random() * 0.5 + 0.2
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255, 182, 193, 0.8)";
    ctx.fill();

    p.y += p.speed;

    if (p.y > canvas.height) {
      p.y = 0;
      p.x = Math.random() * canvas.width;
    }
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
