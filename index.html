<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaelis.xyz</title>
<link rel="icon" href="https://i.postimg.cc/CK9Hnbn3/file-0000000088b871f5b587bd77d7845430.png">

<style>
:root{
  --bg:#05060f;
  --accent:#22c55e;
  --accent2:#3b82f6;
  --text:#e5e7eb;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}
body{background:var(--bg);color:var(--text);overflow-x:hidden;cursor:none}

canvas{position:fixed;top:0;left:0;z-index:-3}

.cursor{
 width:18px;height:18px;border:2px solid var(--accent);
 border-radius:50%;position:fixed;pointer-events:none;
 transform:translate(-50%,-50%);z-index:9999;
}

.glow{
 position:fixed;width:600px;height:600px;
 background:radial-gradient(circle,var(--accent2),transparent 70%);
 filter:blur(120px);opacity:.15;z-index:-1;
}

.container{max-width:1100px;margin:auto;padding:40px}

.hero{
 height:100vh;
 display:flex;
 flex-direction:column;
 justify-content:center;
}

h1{
 font-size:100px;
 font-weight:900;
 background:linear-gradient(90deg,var(--accent),var(--accent2));
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.sub{margin-top:10px;color:#888}

.btns{margin-top:40px;display:flex;gap:15px}

.btn{
 padding:12px 24px;border-radius:12px;border:none;
 cursor:pointer;transition:.2s;
}

.primary{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#000}
.primary:hover{transform:scale(1.08)}

.ghost{background:transparent;border:1px solid #333;color:#fff}
.ghost:hover{border-color:var(--accent)}

.section{margin-top:120px;opacity:0;transform:translateY(60px);transition:.6s}
.section.visible{opacity:1;transform:translateY(0)}

.card{
 background:rgba(255,255,255,0.03);
 backdrop-filter:blur(20px);
 border:1px solid rgba(255,255,255,0.08);
 padding:25px;border-radius:16px;margin-bottom:20px;
 transition:.25s;
}

.card:hover{
 transform:translateY(-6px);
}

.projects .proj{
 padding:16px;border-radius:12px;
 border:1px solid rgba(255,255,255,0.08);
 margin-bottom:12px;transition:.25s;
}

.projects .proj:hover{
 transform:translateX(10px);
 border-color:var(--accent);
}

footer{margin-top:120px;text-align:center;color:#555}

</style>
</head>

<body>
<canvas id="bg"></canvas>
<div class="cursor" id="cursor"></div>
<div class="glow" id="glow"></div>

<div class="container">

<div class="hero">
  <h1 id="vaelis">Vaelis</h1>
  <div class="sub">developer • systems • web</div>

  <div class="btns">
    <button class="btn primary" onclick="scrollToSection()">Explore</button>
    <button class="btn ghost">Contact</button>
  </div>
</div>

<div class="section" id="about">
  <div class="card">Focused on building clean and efficient systems.</div>
  <div class="card">Always improving and evolving skills daily.</div>
</div>

<div class="section projects">
  <div class="proj">System Engine</div>
  <div class="proj">Automation Toolkit</div>
  <div class="proj">Web Platform</div>
</div>

<footer>© 2026 Vaelis</footer>

</div>

<script>
// nome toggle
const n=document.getElementById("vaelis");
let t=false;
n.addEventListener("mouseenter",()=>{if(innerWidth>768)n.innerText="Vaelis.xyz"});
n.addEventListener("mouseleave",()=>{if(innerWidth>768)n.innerText="Vaelis"});
n.addEventListener("click",()=>{t=!t;n.innerText=t?"Vaelis.xyz":"Vaelis"});

// scroll botão
function scrollToSection(){
 document.getElementById("about").scrollIntoView({behavior:"smooth"});
}

// cursor + glow
const cursor=document.getElementById("cursor");
const glow=document.getElementById("glow");
document.addEventListener("mousemove",e=>{
 cursor.style.top=e.clientY+"px";
 cursor.style.left=e.clientX+"px";
 glow.style.top=(e.clientY-300)+"px";
 glow.style.left=(e.clientX-300)+"px";
});

// reveal
const secs=document.querySelectorAll(".section");
function reveal(){
 secs.forEach(s=>{
  if(s.getBoundingClientRect().top<window.innerHeight-80){
    s.classList.add("visible");
  }
 });
}
window.addEventListener("scroll",reveal);
reveal();

// particles
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
}
resize();
window.addEventListener("resize",resize);

let p=[];
for(let i=0;i<80;i++){
 p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5});
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 p.forEach(a=>{
  ctx.fillStyle="#22c55e";
  ctx.fillRect(a.x,a.y,2,2);
  a.x+=a.vx;a.y+=a.vy;
  if(a.x<0||a.x>canvas.width)a.vx*=-1;
  if(a.y<0||a.y>canvas.height)a.vy*=-1;
 });
 requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
